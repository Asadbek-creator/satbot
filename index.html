<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAT Mock — Javoblarni yuborish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0E1420;
    --card: #161D2E;
    --card-border: #232B40;
    --blue: #3B82F6;
    --green: #22C55E;
    --gold: #E8AC27;
    --red: #EF4444;
    --text: #F1F5F9;
    --gray: #8B96AB;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 90px;
  }
  header {
    padding: 20px 16px 8px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 800; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--gray); }

  #mockPicker { padding: 24px 16px; text-align: center; }
  #mockPicker p { color: var(--gray); font-size: 14px; }
  #mockSelect {
    font-size: 17px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    margin: 10px 0 18px;
    width: 100%;
    max-width: 260px;
  }
  .btn-primary {
    background: linear-gradient(90deg, var(--blue), var(--green));
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 20px;
    border-radius: 14px;
    width: 100%;
    max-width: 320px;
    cursor: pointer;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; }

  #formArea, #resultArea { display: none; padding: 14px; }
  .module-title {
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    margin: 18px 4px 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--card-border);
  }
  .qcard {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .qcard .qlabel {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 10px;
    color: var(--text);
  }
  .badge-pill {
    display: inline-block;
    background: var(--blue);
    color: white;
    font-weight: 700;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .choices { display: flex; gap: 8px; flex-wrap: wrap; }
  .choice-btn {
    flex: 1;
    min-width: 52px;
    padding: 12px 0;
    text-align: center;
    border: 2px solid var(--card-border);
    border-radius: 12px;
    font-weight: 800;
    font-size: 15px;
    background: #1B2438;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }
  .choice-btn.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
  }
  .numinput {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border: 2px solid var(--card-border);
    border-radius: 12px;
    background: #1B2438;
    color: var(--text);
  }
  .numinput:focus, .numinput.selected { border-color: var(--blue); outline: none; }

  #progressWrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--card-border);
    padding: 10px 16px 14px;
  }
  #progressBarBg {
    background: var(--card-border);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  #progressBarFill {
    background: linear-gradient(90deg, var(--blue), var(--green));
    height: 100%;
    width: 0%;
    transition: width .2s;
  }
  #progressText { font-size: 12px; color: var(--gray); margin-bottom: 8px; text-align: center; }
  #finishBtn:disabled { background: var(--card-border); color: var(--gray); }

  #loadingMsg, #errorMsg { text-align: center; padding: 30px 16px; color: var(--gray); }
  #errorMsg { color: var(--red); display: none; }

  /* Results screen */
  .score-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 18px;
  }
  .score-card .big { font-size: 46px; font-weight: 800; }
  .score-card .sub { color: var(--gray); font-size: 13px; margin-top: 4px; }
  .review-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .review-row .qnum { font-weight: 700; }
  .review-row .ans { color: var(--gray); font-size: 13px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .dot.correct { background: var(--green); }
  .dot.wrong { background: var(--red); }
  .dot.skipped { background: var(--gray); }
</style>
</head>
<body>

<header>
  <h1>📝 SAT Math Mock</h1>
  <p>Javoblaringizni belgilang</p>
</header>

<div id="mockPicker">
  <p>Nechinchi mock uchun javob yubormoqchisiz?</p>
  <select id="mockSelect"></select><br>
  <button class="btn-primary" onclick="loadMock()">Boshlash</button>
  <div id="loadingMsg" style="display:none;">Yuklanmoqda...</div>
  <div id="errorMsg"></div>
</div>

<div id="formArea"></div>

<div id="resultArea"></div>

<div id="progressWrap" style="display:none;">
  <div id="progressText">0 / 44 ta savolga javob berildi</div>
  <div id="progressBarBg"><div id="progressBarFill"></div></div>
  <button class="btn-primary" id="finishBtn" onclick="finishTest()">✅ Javoblarni yuborish</button>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.expand(); tg.ready(); }

const TOTAL_MOCKS = {{TOTAL_MOCKS}};
let currentMock = null;
let qTypes = null; // {m1: ["mc"/"num", ...22], m2: [...]}
const answers = { m1: Array(22).fill(""), m2: Array(22).fill("") };

const mockSelect = document.getElementById('mockSelect');
for (let i = 1; i <= TOTAL_MOCKS; i++) {
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = "Mock " + i;
  mockSelect.appendChild(opt);
}

async function loadMock() {
  currentMock = parseInt(mockSelect.value, 10);
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  try {
    const res = await fetch('/api/mock/' + currentMock);
    if (!res.ok) throw new Error('not found');
    qTypes = await res.json();
    renderForm();
  } catch (e) {
    document.getElementById('errorMsg').textContent = "Bu mock uchun ma'lumot topilmadi.";
    document.getElementById('errorMsg').style.display = 'block';
  } finally {
    document.getElementById('loadingMsg').style.display = 'none';
  }
}

function renderForm() {
  document.getElementById('mockPicker').style.display = 'none';
  const formArea = document.getElementById('formArea');
  formArea.innerHTML = '';
  formArea.style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';

  const pill = document.createElement('div');
  pill.style.textAlign = 'center';
  pill.innerHTML = '<span class="badge-pill">Mock: ' + currentMock + '</span>';
  formArea.appendChild(pill);

  ['m1', 'm2'].forEach((mod) => {
    const title = document.createElement('div');
    title.className = 'module-title';
    title.textContent = mod === 'm1' ? 'Math — Module 1' : 'Math — Module 2';
    formArea.appendChild(title);

    qTypes[mod].forEach((type, idx) => {
      const card = document.createElement('div');
      card.className = 'qcard';
      const label = document.createElement('div');
      label.className = 'qlabel';
      label.textContent = (idx + 1) + '-savol';
      card.appendChild(label);

      if (type === 'mc') {
        const choices = document.createElement('div');
        choices.className = 'choices';
        ['A', 'B', 'C', 'D'].forEach((letter) => {
          const btn = document.createElement('div');
          btn.className = 'choice-btn';
          btn.textContent = letter;
          btn.onclick = () => {
            choices.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            answers[mod][idx] = letter;
            updateProgress();
          };
          choices.appendChild(btn);
        });
        card.appendChild(choices);
      } else {
        const input = document.createElement('input');
        input.className = 'numinput';
        input.type = 'text';
        input.inputMode = 'decimal';
        input.placeholder = 'Javobni kiriting (masalan 18.5 yoki 7/2)';
        input.oninput = () => {
          answers[mod][idx] = input.value.trim();
          input.classList.toggle('selected', input.value.trim() !== '');
          updateProgress();
        };
        card.appendChild(input);
      }
      formArea.appendChild(card);
    });
  });
  updateProgress();
}

function updateProgress() {
  const filled = answers.m1.filter(a => a !== "").length + answers.m2.filter(a => a !== "").length;
  const pct = Math.round((filled / 44) * 100);
  document.getElementById('progressBarFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = filled + ' / 44 ta savolga javob berildi';
}

async function finishTest() {
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.disabled = true;
  finishBtn.textContent = 'Baholanmoqda...';
  try {
    const res = await fetch('/api/grade/' + currentMock, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ m1_answers: answers.m1, m2_answers: answers.m2 }),
    });
    const result = await res.json();
    renderResults(result);
  } catch (e) {
    finishBtn.disabled = false;
    finishBtn.textContent = '✅ Javoblarni yuborish';
    alert("Baholashda xatolik yuz berdi. Qaytadan urinib ko'ring.");
  }
}

function renderResults(result) {
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const area = document.getElementById('resultArea');
  area.style.display = 'block';
  area.innerHTML = '';

  const scoreCard = document.createElement('div');
  scoreCard.className = 'score-card';
  scoreCard.innerHTML =
    '<div class="big">' + result.scaled_score + '</div>' +
    '<div class="sub">/ 800 · Raw: ' + result.raw_score + ' / ' + result.graded_total + '</div>';
  area.appendChild(scoreCard);

  ['m1', 'm2'].forEach((mod) => {
    const title = document.createElement('div');
    title.className = 'module-title';
    title.textContent = mod === 'm1' ? 'Module 1 — javoblar' : 'Module 2 — javoblar';
    area.appendChild(title);

    result.per_question[mod].forEach((q) => {
      const row = document.createElement('div');
      row.className = 'review-row';
      let dotClass = q.status === 'correct' ? 'correct' : (q.status === 'wrong' ? 'wrong' : 'skipped');
      let ansText = q.status === 'skipped'
        ? "Tekshirilmagan"
        : ('Sizniki: ' + (q.user_answer || '—') + (q.status === 'wrong' ? ' · To\'g\'risi: ' + q.correct_answer : ''));
      row.innerHTML =
        '<div><span class="dot ' + dotClass + '"></span><span class="qnum">' + q.number + '-savol</span></div>' +
        '<div class="ans">' + ansText + '</div>';
      area.appendChild(row);
    });
  });

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-primary';
  closeBtn.style.marginTop = '18px';
  closeBtn.textContent = '✅ Yakunlash va yopish';
  closeBtn.onclick = () => {
    const payload = { mock_number: currentMock, m1_answers: answers.m1, m2_answers: answers.m2 };
    if (tg && tg.sendData) {
      tg.sendData(JSON.stringify(payload));
      tg.close();
    } else {
      alert("Bu sahifa faqat Telegram ilovasi ichida ishlaydi.");
    }
  };
  area.appendChild(closeBtn);
}
</script>
</body>
</html>
